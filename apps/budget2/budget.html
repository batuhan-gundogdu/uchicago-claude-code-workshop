  function submitFundsForm() {
    fundsSetHint("");
    const date = document.getElementById("ff-date").value || todayStr();
    const fund = document.getElementById("ff-fund").value;
    const amount = parseAmount(document.getElementById("ff-amount").value);
    const note = document.getElementById("ff-note").value.trim();
    if (!fundById(fund)) { fundsSetHint("Choose a fund."); return; }
    if (isNaN(amount)) { fundsSetHint("Enter an amount, e.g. 250 (or -50 for a withdrawal)."); return; }
    addLedgerRow({ date: date, fund: fund, amount: amount, note: note });
  }
  /* =========================================================================
   * Analysis page - hand-drawn inline SVG charts + stat lists.
   *
   * Three reusable chart builders (svgLine / svgDonut / svgBars) each return a
   * self-contained SVG string sized by a viewBox, so they scale to whatever
   * container width they land in. No external chart library, no network.
   * ========================================================================= */

  // Ordered pastel palette for categories / slices. Solid hex (not CSS vars)
  // so the SVG renders identically wherever it is placed.
  const CHART_COLORS = [
    "#7c6bd6", // grape
    "#7fb8ec", // sky
    "#7bd0b0", // mint
    "#f4b183", // peach
    "#ef9bbf", // blush
    "#f2d17a", // butter
    "#5a4bb0", // grape-deep
    "#9b95ae", // ink-faint
  ];
  const C_GRID = "#ece7f4";
  const C_INK = "#3a3550";
  const C_INK_SOFT = "#6f6987";
  const C_INK_FAINT = "#9b95ae";

  // Round a raw maximum up to a friendly axis top (1 / 2 / 2.5 / 5 x 10^n).
  function niceMax(v) {
    if (!(v > 0)) return 1;
    const pow = Math.pow(10, Math.floor(Math.log10(v)));
    const n = v / pow;
    let nice;
    if (n <= 1) nice = 1;
    else if (n <= 2) nice = 2;
    else if (n <= 2.5) nice = 2.5;
    else if (n <= 5) nice = 5;
    else nice = 10;
    return nice * pow;
  }

  // Compact money for axis ticks / donut center: "$4.5k", "$320".
  function moneyShort(v) {
    const n = Number(v) || 0;
    const abs = Math.abs(n);
    if (abs >= 1000) return "$" + (Math.round((n / 1000) * 10) / 10) + "k";
    return "$" + Math.round(n);
  }

  // "2025-11" -> "Nov '25"
  function shortMonth(key) {
    if (!key || key.length < 7) return esc(key || "");
    const [y, m] = key.split("-");
    const d = new Date(Number(y), Number(m) - 1, 1);
    return d.toLocaleDateString("en-US", { month: "short" }) + " '" + y.slice(2);
  }

  // svgLine(series, opts) - line chart. series = [{label, value}].
  // Axes, gridlines, money y-scale, labeled x ticks, soft area fill + points.
  function svgLine(series, opts) {
    opts = opts || {};
    const W = 720, H = 260;
    const padL = 60, padR = 18, padT = 18, padB = 42;
    const iw = W - padL - padR, ih = H - padT - padB;
    const n = series.length;
    const color = opts.color || CHART_COLORS[0];
    let max = 0;
    series.forEach((s) => { max = Math.max(max, Number(s.value) || 0); });
    max = niceMax(max);
    const x = (i) => (n <= 1 ? padL + iw / 2 : padL + (iw * i) / (n - 1));
    const y = (v) => padT + ih - ih * (v / max);

    const ticks = 4;
    let grid = "";
    for (let t = 0; t <= ticks; t++) {
      const gv = (max * t) / ticks;
      const gy = y(gv);
      grid += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy +
        '" stroke="' + C_GRID + '" stroke-width="1"/>';
      grid += '<text x="' + (padL - 10) + '" y="' + (gy + 4) + '" text-anchor="end" font-size="11" fill="' +
        C_INK_FAINT + '">' + moneyShort(gv) + '</text>';
    }
    let xlab = "";
    series.forEach((s, i) => {
      xlab += '<text x="' + x(i) + '" y="' + (H - padB + 20) + '" text-anchor="middle" font-size="11" fill="' +
        C_INK_SOFT + '">' + esc(s.label) + '</text>';
    });
    const linePts = series.map((s, i) => x(i) + "," + y(Number(s.value) || 0)).join(" ");
    const areaPts = padL + "," + (padT + ih) + " " + linePts + " " + x(n - 1) + "," + (padT + ih);
    let dots = "";
    series.forEach((s, i) => {
      dots += '<circle cx="' + x(i) + '" cy="' + y(Number(s.value) || 0) +
        '" r="4" fill="#fff" stroke="' + color + '" stroke-width="2.5"/>';
    });
    return '<svg class="chart" viewBox="0 0 ' + W + " " + H + '" role="img" preserveAspectRatio="xMidYMid meet">' +
      grid +
      '<polygon points="' + areaPts + '" fill="' + color + '" opacity="0.08"/>' +
      '<polyline points="' + linePts + '" fill="none" stroke="' + color +
        '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
      dots + xlab +
    '</svg>';
  }

  // svgDonut(slices, opts) - donut with center total and an SVG legend
  // (colour swatch + label + money + percentage) on the right.
  // slices = [{label, value, color?}].
  function svgDonut(slices, opts) {
    opts = opts || {};
    const W = 560, H = 300;
    const cx = 150, cy = 150, r = 96, thick = 34;
    const circ = 2 * Math.PI * r;
    const total = slices.reduce((s, x) => s + (Number(x.value) || 0), 0);

    let segs = "";
    if (total <= 0) {
      segs = '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + C_GRID +
        '" stroke-width="' + thick + '"/>';
    } else {
      let acc = 0;
      slices.forEach((sl, i) => {
        const val = Number(sl.value) || 0;
        if (val <= 0) return;
        const len = (val / total) * circ;
        const color = sl.color || CHART_COLORS[i % CHART_COLORS.length];
        segs += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + color +
          '" stroke-width="' + thick + '" stroke-dasharray="' + len + " " + (circ - len) +
          '" stroke-dashoffset="' + (-acc) + '" transform="rotate(-90 ' + cx + " " + cy + ')"/>';
        acc += len;
      });
    }
    const center =
      '<text x="' + cx + '" y="' + (cy - 4) + '" text-anchor="middle" font-size="12.5" fill="' +
        C_INK_FAINT + '">Total</text>' +
      '<text x="' + cx + '" y="' + (cy + 20) + '" text-anchor="middle" font-size="21" font-weight="700" fill="' +
        C_INK + '">' + esc(moneyShort(total)) + '</text>';

    let leg = "";
    const lx = 300;
    let ly = 42;
    if (!slices.length) {
      leg = '<text x="' + lx + '" y="' + ly + '" font-size="12.5" fill="' + C_INK_FAINT +
        '">No spending in range.</text>';
    }
    slices.forEach((sl, i) => {
      const val = Number(sl.value) || 0;
      const pct = total > 0 ? Math.round((val / total) * 100) : 0;
      const color = sl.color || CHART_COLORS[i % CHART_COLORS.length];
      leg += '<rect x="' + lx + '" y="' + (ly - 11) + '" width="13" height="13" rx="3" fill="' + color + '"/>';
      leg += '<text x="' + (lx + 20) + '" y="' + ly + '" font-size="12.5" fill="' + C_INK + '">' +
        esc(sl.label) + '</text>';
      leg += '<text x="' + (W - 14) + '" y="' + ly + '" text-anchor="end" font-size="12.5" font-weight="600" fill="' +
        C_INK_SOFT + '">' + esc(money(val)) + '  ' + pct + '%</text>';
      ly += 29;
    });
    return '<svg class="chart" viewBox="0 0 ' + W + " " + H + '" role="img" preserveAspectRatio="xMidYMid meet">' +
      segs + center + leg +
    '</svg>';
  }

  // svgBars(pairs, opts) - grouped/paired bars. pairs = [{label, a, b}].
  // Two bars per label (default Planned vs Actual) with a small top legend.
  function svgBars(pairs, opts) {
    opts = opts || {};
    const W = 760, H = 300;
    const padL = 58, padR = 16, padT = 30, padB = 66;
    const iw = W - padL - padR, ih = H - padT - padB;
    const n = pairs.length;
    const colA = opts.colorA || CHART_COLORS[1]; // sky - planned
    const colB = opts.colorB || CHART_COLORS[0]; // grape - actual
    const labA = opts.labelA || "Planned";
    const labB = opts.labelB || "Actual";
    let max = 0;
    pairs.forEach((p) => { max = Math.max(max, Number(p.a) || 0, Number(p.b) || 0); });
    max = niceMax(max);
    const y = (v) => padT + ih - ih * (v / max);
    const groupW = n > 0 ? iw / n : iw;
    const barW = Math.max(6, Math.min(20, groupW * 0.32));
    const gap = 4;

    const ticks = 4;
    let grid = "";
    for (let t = 0; t <= ticks; t++) {
      const gv = (max * t) / ticks;
      const gy = y(gv);
      grid += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy +
        '" stroke="' + C_GRID + '" stroke-width="1"/>';
      grid += '<text x="' + (padL - 10) + '" y="' + (gy + 4) + '" text-anchor="end" font-size="11" fill="' +
        C_INK_FAINT + '">' + moneyShort(gv) + '</text>';
    }
    const baseline = padT + ih;
    let bars = "";
    pairs.forEach((p, i) => {
      const gx = padL + groupW * i + groupW / 2;
      const a = Number(p.a) || 0, b = Number(p.b) || 0;
      const ax = gx - barW - gap / 2, bx = gx + gap / 2;
      // Negative (or NaN-derived zero) values are clamped to a zero-height bar so the rect stays valid SVG.
      const ha = Math.max(0, baseline - y(a)) || 0;
      const hb = Math.max(0, baseline - y(b)) || 0;
      bars += '<rect x="' + ax + '" y="' + (baseline - ha) + '" width="' + barW + '" height="' + ha +
        '" rx="3" fill="' + colA + '"/>';
      bars += '<rect x="' + bx + '" y="' + (baseline - hb) + '" width="' + barW + '" height="' + hb +
        '" rx="3" fill="' + colB + '"/>';
      const ly = padT + ih + 15;
      bars += '<text x="' + gx + '" y="' + ly + '" text-anchor="end" font-size="10.5" fill="' + C_INK_SOFT +
        '" transform="rotate(-35 ' + gx + " " + ly + ')">' + esc(p.label) + '</text>';
    });
    const leg =
      '<rect x="' + padL + '" y="8" width="12" height="12" rx="3" fill="' + colA + '"/>' +
      '<text x="' + (padL + 18) + '" y="18" font-size="12" fill="' + C_INK + '">' + esc(labA) + '</text>' +
      '<rect x="' + (padL + 92) + '" y="8" width="12" height="12" rx="3" fill="' + colB + '"/>' +
      '<text x="' + (padL + 110) + '" y="18" font-size="12" fill="' + C_INK + '">' + esc(labB) + '</text>';
    return '<svg class="chart" viewBox="0 0 ' + W + " " + H + '" role="img" preserveAspectRatio="xMidYMid meet">' +
      grid + bars + leg +
    '</svg>';
  }

  /* ---- Analysis data helpers (all derived from settings, nothing hardcoded) ---- */

  // Scope for the category donut / biggest lists: "month" or "all".
  let analysisScope = "month";

  function analysisExpenseLines() {
    return (App.state.settings.lines || []).filter((l) => l.type !== "income");
  }

  // Total expense for one month = sum of every expense line's actual.
  function monthTotalExpense(m) {
    return analysisExpenseLines().reduce((s, l) => s + actualForLine(l.id, m), 0);
  }

  // Category -> summed actual across the given months, sorted high to low.
  function categoryTotals(months) {
    const map = Object.create(null);
    const order = [];
    analysisExpenseLines().forEach((l) => {
      let sum = 0;
      months.forEach((m) => { sum += actualForLine(l.id, m); });
      if (sum > 0) {
        const cat = l.category || "Other";
        if (!(cat in map)) { map[cat] = 0; order.push(cat); }
        map[cat] += sum;
      }
    });
    return order.map((c) => ({ label: c, value: map[c] })).sort((a, b) => b.value - a.value);
  }

  // Individual entries within scope, largest first, capped at `limit`.
  function biggestEntries(months, limit) {
    const inScope = Object.create(null);
    months.forEach((m) => { inScope[m] = true; });
    return (App.state.entries || [])
      .filter((e) => inScope[monthKey(e.date)])
      .slice()
      .sort((a, b) => (Number(b.amount) || 0) - (Number(a.amount) || 0))
      .slice(0, limit || 8);
  }

  function entryDetailText(e) {
    if (e.line === "groceries") return e.store || "";
    if (e.line === "enjoy") return e.note || "";
    return e.item || "";
  }

  function bigExpenseRowHtml(e, rank) {
    const main = entryDetailText(e);
    const mainHtml = main ? esc(main) : '<span class="muted">' + esc(lineName(e.line)) + "</span>";
    const line = lineById(e.line);
    const cat = line && line.category ? line.category : "";
    const sub = esc(lineName(e.line)) + (cat ? "  " + esc(cat) : "");
    return '<div class="big-row">' +
      '<span class="bg-rank">' + rank + "</span>" +
      '<span class="bg-date">' + esc(e.date) + "</span>" +
      '<span class="bg-amount">' + esc(money(e.amount)) + "</span>" +
      '<span class="bg-detail">' +
        '<div class="bg-main">' + mainHtml + "</div>" +
        '<div class="bg-sub">' + sub + "</div>" +
      "</span>" +
    "</div>";
  }

  function rankRowHtml(item, max, i) {
    const color = CHART_COLORS[i % CHART_COLORS.length];
    const pct = max > 0 ? Math.round((item.value / max) * 100) : 0;
    return '<div class="rank-row">' +
      '<span class="rk-name">' + esc(item.label) + "</span>" +
      '<span class="rk-val">' + esc(money(item.value)) + "</span>" +
      '<span class="rk-track"><span class="rk-fill" style="width:' + pct + "%;background:" + color + '"></span></span>' +
    "</div>";
  }

  function renderAnalysis() {
    const months = availableMonths();
    if (!months.length) {
      return '<div class="card"><div class="an-head"><div class="titles">' +
        "<h2>Analysis</h2><p>Trends and breakdowns across your budget.</p></div></div>" +
        '<div class="an-empty">No data to analyse yet. Add some entries or monthly amounts first.</div></div>';
    }

    // No actual spending anywhere (e.g. only income recorded, or freshly reset)
    // - show a gentle empty state rather than all-zero / NaN charts.
    const totalSpend = months.reduce((s, m) => s + monthTotalExpense(m), 0);
    if (!(totalSpend > 0)) {
      return '<div class="card"><div class="an-head"><div class="titles">' +
        "<h2>Analysis</h2><p>Trends and breakdowns across your budget.</p></div></div>" +
        '<div class="an-empty">No spending to analyze yet. Log a few expenses and the charts appear here.</div></div>';
    }

    // Selected month drives the bars and (in month scope) the donut / lists.
    let sel = App.month;
    if (!sel || months.indexOf(sel) === -1) sel = months[months.length - 1];
    if (App.month !== sel) { App.month = sel; updateMonthIndicator(); }

    const scopeMonths = analysisScope === "all" ? months : [sel];
    const scopeName = analysisScope === "all" ? "all time" : monthLabel(sel);

    // 1. Month-by-month total spending trend (always all months).
    const trend = months.map((m) => ({ label: shortMonth(m), value: monthTotalExpense(m) }));

    // 2. Spending by category donut for the current scope.
    const cats = categoryTotals(scopeMonths);
    const catSlices = cats.map((c, i) => ({ label: c.label, value: c.value, color: CHART_COLORS[i % CHART_COLORS.length] }));

    // 3. Planned vs actual per expense line for the selected month.
    const barPairs = analysisExpenseLines().map((l) => ({
      label: l.name, a: plannedForLine(l.id), b: actualForLine(l.id, sel),
    }));

    // 4. Biggest single expenses - a hall of fame across all history (individual
    //    entries only, so this stays all-time rather than following the scope
    //    toggle, which can land on a month with monthly totals but no entries).
    const bigE = biggestEntries(months, 8);
    // 5. Biggest categories follow the donut scope.
    const topCats = cats.slice(0, 6);
    const catMax = topCats.length ? topCats[0].value : 0;

    // Controls: scope segmented toggle + month picker.
    const monthOpts = months.map((k) =>
      '<option value="' + esc(k) + '"' + (k === sel ? " selected" : "") + ">" + esc(monthLabel(k)) + "</option>"
    ).join("");
    const controls =
      '<div class="an-controls">' +
        '<div class="seg-wrap"><span>Scope</span>' +
          '<div class="seg" id="an-scope" role="group" aria-label="Analysis scope">' +
            '<button type="button" data-scope="month" aria-pressed="' + (analysisScope === "month") + '">This month</button>' +
            '<button type="button" data-scope="all" aria-pressed="' + (analysisScope === "all") + '">All time</button>' +
          "</div>" +
        "</div>" +
        '<div class="month-picker"><label for="an-month">Month</label>' +
          '<select id="an-month">' + monthOpts + "</select></div>" +
      "</div>";

    const headCard =
      '<div class="card an-card"><div class="an-head">' +
        '<div class="titles"><h2>Analysis</h2>' +
          "<p>Fancy graphs and stats - hand-drawn, no libraries. Showing <b>" + esc(scopeName) + "</b>.</p></div>" +
        controls +
      "</div></div>";

    const trendCard =
      '<div class="card an-card">' +
        '<h3 class="sec-title">Monthly spending trend</h3>' +
        '<div class="chart-box">' + svgLine(trend, {}) + "</div>" +
      "</div>";

    const catList = topCats.length
      ? '<div class="rank-list">' + topCats.map((c, i) => rankRowHtml(c, catMax, i)).join("") + "</div>"
      : '<div class="an-empty">No spending in this range.</div>';
    const donutCard =
      '<div class="card an-card"><div class="an-grid">' +
        "<div>" +
          '<h3 class="sec-title">Spending by category</h3>' +
          '<div class="chart-box">' + svgDonut(catSlices, {}) + "</div>" +
        "</div>" +
        "<div>" +
          '<h3 class="sec-title">Biggest categories</h3>' + catList +
        "</div>" +
      "</div></div>";

    const barsCard =
      '<div class="card an-card">' +
        '<h3 class="sec-title">Planned vs actual - ' + esc(monthLabel(sel)) + "</h3>" +
        '<div class="chart-box">' + svgBars(barPairs, {}) + "</div>" +
      "</div>";

    const bigList = bigE.length
      ? '<div class="big-list">' + bigE.map((e, i) => bigExpenseRowHtml(e, i + 1)).join("") + "</div>"
      : '<div class="an-empty">No individual entries in this range.</div>';
    const bigCard =
      '<div class="card an-card">' +
        '<h3 class="sec-title">Biggest single expenses - all time</h3>' + bigList +
      "</div>";

    return headCard + trendCard + donutCard + barsCard + bigCard;
  }

  /* ---- Analysis page event handling (delegated on #view) ---- */
  function onAnalysisClick(e) {
    const btn = e.target.closest("[data-scope]");
    if (btn) {
      analysisScope = btn.dataset.scope;
      render();
    }
  }
  function onAnalysisChange(e) {
    if (e.target.id === "an-month") {
      App.month = e.target.value;
      updateMonthIndicator();
      render();
    }
  }

  const RENDERERS = {
    entry: renderEntry,
    monthly: renderMonthly,
    funds: renderFunds,
    analysis: renderAnalysis,
  };

  // render() - re-render the active tab into <main id="view">.
  function render() {
    if (!App.state) {
      view.innerHTML = emptyStateHtml();
      wireEmptyState();
      return;
    }
    view.innerHTML = (RENDERERS[App.tab] || renderEntry)();
  }

  // setTab(name) - name in entry|monthly|funds|analysis; sets active tab and renders.
  function setTab(name) {
    if (!RENDERERS[name]) return;
    App.tab = name;
    document.querySelectorAll(".tab").forEach((el) => {
      el.setAttribute("aria-selected", el.dataset.tab === name ? "true" : "false");
    });
    render();
  }

  /* ---- Empty / open state (shown until a file is loaded) ---- */
  function emptyStateHtml() {
    const note = hasFsAccess()
      ? "Your file stays on your computer. Nest reopens it automatically next time."
      : "This browser can't open files directly. Use Import to load your budget, and Export to save changes.";
    return '' +
      '<div class="card"><div class="empty">' +
        '<div class="art" aria-hidden="true">' +
          '<svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M12 11v4M10 13h4"/></svg>' +
        '</div>' +
        '<h2>Open your budget file</h2>' +
        '<p>Pick your <b>budget.json</b> to see the whole picture - entries, monthly view, funds, and analysis.</p>' +
        '<div class="cta">' +
          '<button class="btn primary" id="empty-open" type="button">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>' +
            'Open budget file</button>' +
          '<button class="btn" id="empty-import" type="button">Import instead</button>' +
        '</div>' +
        '<div class="hint">' +
          '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>' +
          note +
        '</div>' +
      '</div></div>';
  }

  function wireEmptyState() {
    const o = document.getElementById("empty-open");
    const i = document.getElementById("empty-import");
    if (o) o.addEventListener("click", openFile);
    if (i) i.addEventListener("click", () => document.getElementById("file-input").click());
  }

  /* =========================================================================
   * Wiring
   * ========================================================================= */
  document.getElementById("btn-open").addEventListener("click", openFile);
  document.getElementById("btn-export").addEventListener("click", exportJson);
  document.getElementById("btn-import").addEventListener("click", () =>
    document.getElementById("file-input").click());
  document.getElementById("btn-reset").addEventListener("click", () => {
    if (!App.state) return;
    const ok = window.confirm(
      "Start fresh? This clears every entry, monthly amount, and fund movement, " +
      "but keeps your budget lines and stores. This cannot be undone. " +
      "Consider Export first to keep a copy."
    );
    if (ok) resetData();
  });

  document.getElementById("file-input").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) importJson(file).catch((err) => {
      console.error("import failed:", err);
      setSaveStatus("unsaved", "bad file");
    });
    e.target.value = ""; // allow re-picking the same file
  });

  document.getElementById("tabs").addEventListener("click", (e) => {
    const tab = e.target.closest(".tab");
    if (tab) setTab(tab.dataset.tab);
  });

  // Durability: if the tab is closing / backgrounding while a debounced save is
  // still pending, write it out now so the last edit is not lost. No-op unless
  // there is a writable handle with a save queued (see flushSave).
  window.addEventListener("beforeunload", flushSave);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") flushSave();
  });

  // Entry page uses event delegation on #view (its markup is re-rendered often).
  view.addEventListener("click", (e) => {
    if (!App.state) return;
    if (App.tab === "entry") onEntryClick(e);
    else if (App.tab === "monthly") onMonthlyClick(e);
    else if (App.tab === "funds") onFundsClick(e);
    else if (App.tab === "analysis") onAnalysisClick(e);
  });
  view.addEventListener("change", (e) => {
    if (!App.state) return;
    if (App.tab === "entry") onEntryChange(e);
    else if (App.tab === "monthly") onMonthlyChange(e);
    else if (App.tab === "analysis") onAnalysisChange(e);
  });
  view.addEventListener("submit", (e) => {
    if (!App.state) return;
    if (App.tab === "entry" && e.target.id === "entry-form") {
      e.preventDefault();
      submitEntryForm();
    } else if (App.tab === "funds" && e.target.id === "funds-form") {
      e.preventDefault();
      submitFundsForm();
    }
  });

  /* ---- On load: try to silently reopen the stored handle ---- */
  async function boot() {
    setTab("entry"); // marks the Entry tab active; render() shows empty state while state is null
    if (!hasFsAccess()) return;
    try {
      const handle = await idbGet(HANDLE_KEY);
      if (!handle) return;
      const perm = await handle.queryPermission({ mode: "readwrite" });
      if (perm === "granted") {
        App.handle = handle;
        await loadFromHandle(handle);
      }
      // If permission is "prompt", requesting it needs a user gesture, so we
      // leave the friendly empty state up; clicking Open re-grants and loads.
    } catch (err) {
      console.warn("could not reopen stored file:", err);
    }
  }

  /* ---- Expose the interface surface later tasks depend on ---- */
  App.openFile = openFile;
  App.save = save;
  App.flushSave = flushSave;
  App.defaultMonth = defaultMonth;
  App.validateBudget = validateBudget;
  App.exportJson = exportJson;
  App.importJson = importJson;
  App.resetData = resetData;
  App.render = render;
  App.setTab = setTab;
  App.money = money;
  App.monthKey = monthKey;
  App.uid = uid;
  App.esc = esc;
  App.addEntry = addEntry;
  App.updateEntry = updateEntry;
  App.deleteEntry = deleteEntry;
  App.addMonthlyActual = addMonthlyActual;
  App.deleteMonthlyActual = deleteMonthlyActual;
  App.renderEntry = renderEntry;
  App.renderMonthly = renderMonthly;
  App.plannedForLine = plannedForLine;
  App.actualForLine = actualForLine;
  App.availableMonths = availableMonths;
  App.renderFunds = renderFunds;
  App.autoContributions = autoContributions;
  App.fundBalance = fundBalance;
  App.monthsOfRunway = monthsOfRunway;
  App.addLedgerRow = addLedgerRow;
  App.deleteLedgerRow = deleteLedgerRow;
  App.renderAnalysis = renderAnalysis;
  App.svgLine = svgLine;
  App.svgDonut = svgDonut;
  App.svgBars = svgBars;

  boot();
})();
</script>
</body>
</html>
